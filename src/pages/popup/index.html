<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Popup</title>
</head>

<body class="loading">
  <div id="root">
    <div class="display js-popup">
      <a href="#" class="logo">
        <img src="/assets/images/logo.png">
      </a>

      <div class="stats">
        <div class="stats__img">
          <img src="/assets/images/broom-icon.png" alt="">
        </div>

        <div class="stats__content">
          <strong class="stats__heading">Blocked: 0</strong>

          <p class="stats__subheading">Total: 0</p>
        </div>
      </div>

      <div class="mascot">
        <div class="mascot__circle">
          <img src="/assets/images/circle.svg">

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMinYMin meet">
            <circle cx="50" cy="50" r="48" />
          </svg>
        </div>

        <img class="mascot__img mascot__awake" src="/assets/images/mascot-awake.png">

        <img class="mascot__img mascot__asleep" src="/assets/images/mascot-asleep.png">
      </div>

      <p class="tab-url">Loading...</p>

      <p class="status">Loading...</p>
    </div>

    <div class="actions">
      <ul class="menu">
        <li class="menu__item">
          <div class="menu__icon">
            <img src="/assets/images/shield-icon.png">
          </div>

          <span class="checkbox-label">Enabled on this site</span>

          <div class="toggle">
            <input type="checkbox" id="settings-toggle" class="toggle__switch" checked>

            <label for="settings-toggle" class="toggle__label"></label>
          </div>
        </li>

        <li class="menu__item">
          <div class="menu__icon">
            <img src="/assets/images/cross-icon.png">
          </div>

          <span>Block element</span>
        </li>

        <li class="menu__item">
          <div class="menu__icon">
            <img src="/assets/images/cog-icon.png">
          </div>

          <span>Settings</span>
        </li>
      </ul>

      <ul class="socials">
        <!-- Social icons placeholder -->
      </ul>
    </div>
  </div>
</body>

</html>
